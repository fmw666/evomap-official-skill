name: Skill CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Run Native Tests
        run: |
          chmod +x tests/*.sh
          ./tests/run_tests.sh
          
      - name: Run Robustness Tests
        run: |
          chmod +x tests/*.sh
          ./tests/test_robustness.sh
